name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  php-lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Lint PHP files
        run: find . -path './plugin-update-checker' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l
